# EC サイト用 nginx 設定（ec.komaki-wms.com / HTTP ポート80）。
# 同一オリジンで「React の静的ファイル配信」＋「/api・/admin を gunicorn:8001 へproxy」する。
# 配置:
#   sudo cp backend/deploy/nginx-ec.conf /etc/nginx/sites-available/ec
#   sudo ln -s /etc/nginx/sites-available/ec /etc/nginx/sites-enabled/ec
#   sudo nginx -t && sudo systemctl reload nginx
# この後 `sudo certbot --nginx -d ec.komaki-wms.com` で 443 とリダイレクトが自動追記される。
# server_name とパスは自分の値に置き換えること。

server {
    listen 80;
    server_name ec.komaki-wms.com;

    # 商品画像アップロード等に余裕を持たせる
    client_max_body_size 10M;

    # React のビルド成果物（pnpm build の出力）を配信する
    root /home/ubuntu/ec/frontend/dist;
    index index.html;

    # EC backend の API → gunicorn(:8001)
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Django の SECURE_PROXY_SSL_HEADER が「元は HTTPS」を判定するために必須
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django 管理画面 → gunicorn(:8001)
    location /admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django(admin)の静的ファイル（collectstatic の集約先 STATIC_ROOT）
    location /static/ {
        alias /home/ubuntu/ec/backend/staticfiles/;
        expires 30d;
        access_log off;
    }

    # アップロード画像（フェーズ1: ローカル media。将来 S3 に移行）
    location /media/ {
        alias /home/ubuntu/ec/backend/media/;
        expires 30d;
        access_log off;
    }

    # 上記以外は React SPA に渡す。実ファイルがあればそれを、無ければ index.html
    #（/products/5 や /cart などのクライアントルーティングを成立させる）。
    location / {
        try_files $uri /index.html;
    }
}
